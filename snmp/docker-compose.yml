version: '3.8'

services:
  zabbix-db:
    image: postgres:15
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
    volumes:
      - db_data:/var/lib/postgresql/data

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:latest
    depends_on:
      - zabbix-db
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
    ports:
      - "10051:10051"

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    depends_on:
      - zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: Europe/Bucharest
    ports:
      - "8080:8080"

  snmp-agent1:
    build: ./snmp-agent
    container_name: snmp-agent1

  snmp-agent2:
    build: ./snmp-agent
    container_name: snmp-agent2

  snmp-agent3:
    build: ./snmp-agent
    container_name: snmp-agent3

volumes:
  db_data: